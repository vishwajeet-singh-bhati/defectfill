# ============================================================
# configs/config.yaml
# Central configuration for DefectFill on MVTec Dataset
# ============================================================

# ── Dataset ──────────────────────────────────────────────────
dataset:
  root: "./mvtec_anomaly_detection"
  img_size: 512
  grayscale_to_rgb: false
  reference_split: 0.33
  seed: 42

  # Mask generation from bounding boxes
  mask_mode: "dilated"
  dilation_factor: 1.15   # 15% larger than tight bbox

  objects:
    - bottle
    - capsule
    - carpet
    - hazelnut
    - leather
    - pill
    - tile
    - toothbrush
    - wood
    - zipper

  defect_types:
    bottle:     [broken_large, broken_small, contamination]
    capsule:    [crack, faulty_imprint, poke, scratch, squeeze]
    carpet:     [color, cut, hole, metal_contamination, thread]
    hazelnut:   [crack, cut, hole, print]
    leather:    [color, cut, fold, glue, poke]
    pill:       [color, contamination, crack, faulty_imprint, scratch, type]
    tile:       [crack, glue_strip, gray_stroke, oil, rough]
    toothbrush: [defective]
    wood:       [color, combined, hole, liquid, scratch]
    zipper:     [broken_teeth, combined, fabric_border, fabric_interior, rough, split_teeth, squeezed_teeth]

  object_prompts:
    bottle:     "A bottle with"
    capsule:    "A capsule with"
    carpet:     "A carpet with"
    hazelnut:   "A hazelnut with"
    leather:    "A leather with"
    pill:       "A pill with"
    tile:       "A tile with"
    toothbrush: "A toothbrush with"
    wood:       "A wood with"
    zipper:     "A zipper with"

  grayscale_objects: [zipper, screw, grid]

# ── Stable Diffusion Base Model ───────────────────────────────
model:
  base_model_id: "sd2-community/stable-diffusion-2-inpainting" 

  lora:
    rank: 8
    alpha: 8
    target_modules:
      - "to_q"
      - "to_v"
      - "to_k"
      - "to_out.0"
      - "ff.net.0.proj"
      - "ff.net.2"

  placeholder_token: "[V*]"

# ── Text Prompts ──────────────────────────────────────────────
prompts:
  # Paper uses "A photo of [V*]"
  defect_template: "A photo showing a {placeholder} defect"
  # Object prompt: provides semantic context (object + defect relationship)
  object_template: "A photo of a {object} with a {placeholder} defect"

# ── Training (Fine-tuning) ────────────────────────────────────
training:
  output_dir: "./outputs/checkpoints"
  num_train_steps: 400
  batch_size: 1
  gradient_accumulation: 4
  mixed_precision: "fp16"

  lr_unet: 2.0e-4
  lr_text_encoder: 4.0e-5
  lr_scheduler: "constant"
  warmup_steps: 0

  lambda_def: 0.5
  lambda_obj: 0.2
  lambda_attn: 0.05
  alpha_bg: 0.1
  num_random_boxes: 30
  save_steps: 100
  log_steps: 10

# ── Generation (Inference) ────────────────────────────────────
generation:
  output_dir: "./outputs/generated"
  num_samples_per_class: 1000
  num_candidates: 8
  ddim_steps: 50
  guidance_scale: 7.5
  seed: 0
  lfs_metric: "lpips"

# ── Downstream: Classification ────────────────────────────────
classification:
  model: "resnet34"
  pretrained: true
  num_classes: 8
  epochs: 50
  batch_size: 32
  lr: 1.0e-4
  output_dir: "./outputs/results/classification"

# ── Downstream: Localization ─────────────────────────────────
localization:
  model: "unet"
  encoder: "resnet34"
  in_channels: 3
  num_classes: 1
  epochs: 50
  batch_size: 8
  lr: 1.0e-4
  focal_loss_gamma: 2.0
  output_dir: "./outputs/results/localization"

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  kid_num_samples: 1000
  results_dir: "./outputs/results"